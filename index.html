<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay Tracker</title>
  <script>
    // Minimal hardcoded data. baseDate accepts DD/MM/YY or DD/MM/YYYY.
    const money_in = [
      { name: "Job1", amount: 600, baseDate: "27/03/24", type: "fixed_period", periodDays: 14 },
      { name: "Job2", amount: 900, baseDate: "27/03/19", type: "calendar_date", calendarDay: 28 }
    ];
    const money_out = [
      { name: "Rent", amount: 450, baseDate: "01/03/24", type: "calendar_date", calendarDay: 1 },
      { name: "Phone", amount: 35, baseDate: "20/03/24", type: "fixed_period", periodDays: 30 },
    ];

    const currencySymbol = "£";
    const msPerDay = 24 * 60 * 60 * 1000;

    function parseDate(value) {
      const parts = String(value).split("/");
      if (parts.length !== 3) return null;

      const day = Number(parts[0]);
      const monthIndex = Number(parts[1]) - 1;
      let year = Number(parts[2]);
      if (!Number.isFinite(day) || !Number.isFinite(monthIndex) || !Number.isFinite(year)) return null;

      if (parts[2].length === 2) year += 2000;

      return new Date(year, monthIndex, day);
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${d}-${m}-${y}`;
    }

    function formatIsoDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function daysUntil(targetDate, nowDate) {
      return Math.round((startOfDay(targetDate) - startOfDay(nowDate)) / msPerDay);
    }

    function endOfMonthDay(year, monthIndex) {
      return new Date(year, monthIndex + 1, 0).getDate();
    }

    function getPaymentSchedule(payment) {
      if (payment.type === "fixed_period") {
        const periodDays = Number(payment.periodDays);
        if (!Number.isFinite(periodDays) || periodDays <= 0) return null;
        return { type: "fixed_period", periodDays };
      }

      if (payment.type === "calendar_date") {
        const dayOfMonth = Number(payment.calendarDay);
        if (!Number.isFinite(dayOfMonth) || dayOfMonth < 1 || dayOfMonth > 31) return null;
        return { type: "calendar_date", dayOfMonth };
      }

      return null;
    }

    function shiftMonth(year, monthIndex, offset) {
      const absolute = year * 12 + monthIndex + offset;
      return {
        year: Math.floor(absolute / 12),
        monthIndex: ((absolute % 12) + 12) % 12
      };
    }

    function createCalendarDate(year, monthIndex, dayOfMonth) {
      const monthDay = Math.min(dayOfMonth, endOfMonthDay(year, monthIndex));
      return new Date(year, monthIndex, monthDay);
    }

    const recurrenceStrategies = {
      fixed_period: {
        nextOnOrAfter(schedule, baseDate, targetDate) {
          const base = startOfDay(baseDate);
          const target = startOfDay(targetDate);
          if (base >= target) return base;
          const elapsedDays = Math.floor((target - base) / msPerDay);
          const periodsElapsed = Math.ceil(elapsedDays / schedule.periodDays);
          return new Date(base.getFullYear(), base.getMonth(), base.getDate() + periodsElapsed * schedule.periodDays);
        },
        previous(schedule, occurrenceDate) {
          const occurrence = startOfDay(occurrenceDate);
          return new Date(
            occurrence.getFullYear(),
            occurrence.getMonth(),
            occurrence.getDate() - schedule.periodDays
          );
        },
        next(schedule, occurrenceDate) {
          const occurrence = startOfDay(occurrenceDate);
          return new Date(
            occurrence.getFullYear(),
            occurrence.getMonth(),
            occurrence.getDate() + schedule.periodDays
          );
        }
      },
      calendar_date: {
        nextOnOrAfter(schedule, baseDate, targetDate) {
          const target = startOfDay(targetDate);
          const year = target.getFullYear();
          const monthIndex = target.getMonth();
          const candidateThisMonth = createCalendarDate(year, monthIndex, schedule.dayOfMonth);
          if (candidateThisMonth >= target) return candidateThisMonth;
          const nextMonth = shiftMonth(year, monthIndex, 1);
          return createCalendarDate(nextMonth.year, nextMonth.monthIndex, schedule.dayOfMonth);
        },
        previous(schedule, occurrenceDate) {
          const occurrence = startOfDay(occurrenceDate);
          const prevMonth = shiftMonth(occurrence.getFullYear(), occurrence.getMonth(), -1);
          return createCalendarDate(prevMonth.year, prevMonth.monthIndex, schedule.dayOfMonth);
        },
        next(schedule, occurrenceDate) {
          const occurrence = startOfDay(occurrenceDate);
          const nextMonth = shiftMonth(occurrence.getFullYear(), occurrence.getMonth(), 1);
          return createCalendarDate(nextMonth.year, nextMonth.monthIndex, schedule.dayOfMonth);
        }
      }
    };

    function normalizeEntry(entry) {
      const baseDate = parseDate(entry.baseDate);
      const schedule = getPaymentSchedule(entry);
      if (!baseDate || !schedule) return null;
      return {
        name: entry.name,
        amount: Number(entry.amount),
        baseDate: startOfDay(baseDate),
        schedule
      };
    }

    function getRecurrenceStrategy(schedule) {
      return recurrenceStrategies[schedule.type] || null;
    }

    function projectEntryTimeline(entry, nowDate, horizonEndDate) {
      const strategy = getRecurrenceStrategy(entry.schedule);
      if (!strategy) return null;

      const now = startOfDay(nowDate);
      const horizonEnd = startOfDay(horizonEndDate);
      const nextDate = strategy.nextOnOrAfter(entry.schedule, entry.baseDate, now);
      const previousCandidate = strategy.previous(entry.schedule, nextDate);
      const previousDate = entry.schedule.type === "calendar_date" && nextDate <= now
        ? nextDate
        : (previousCandidate > now ? null : previousCandidate);

      const upcomingDates = [];
      let cursor = startOfDay(nextDate);
      while (cursor <= horizonEnd) {
        upcomingDates.push(cursor);
        cursor = strategy.next(entry.schedule, cursor);
      }

      return {
        previousDate,
        nextDate,
        upcomingDates
      };
    }

    function buildEntriesData(entries, options) {
      const today = new Date();
      const calendarEndDate = new Date(today.getFullYear() + 2, today.getMonth(), today.getDate());
      const rows = [];
      const events = [];
      const futureColor = options.futureColor;
      const pastColor = options.pastColor;

      for (const entry of entries) {
        const normalized = normalizeEntry(entry);
        if (!normalized) {
          console.warn("Skipping invalid entry:", entry);
          continue;
        }
        const timeline = projectEntryTimeline(normalized, today, calendarEndDate);
        if (!timeline) {
          console.warn("Skipping invalid entry:", entry);
          continue;
        }
        const nextDate = timeline.nextDate;
        const lastDate = timeline.previousDate;

        const row = {
          name: entry.name,
          amount: `${currencySymbol}${Number(entry.amount).toFixed(2)}`,
          lastDate: lastDate ? formatDate(lastDate) : "-",
          nextDate: formatDate(nextDate),
          daysUntil: daysUntil(nextDate, today)
        };
        rows.push(row);
        if (lastDate) {
          events.push({
            title: `${entry.name} ${currencySymbol}${Number(entry.amount).toFixed(2)}`,
            start: formatIsoDate(lastDate),
            allDay: true,
            color: pastColor,
            amount: Number(entry.amount)
          });
        }
        for (const futureDate of timeline.upcomingDates) {
          events.push({
            title: `${entry.name} ${currencySymbol}${Number(entry.amount).toFixed(2)}`,
            start: formatIsoDate(futureDate),
            allDay: true,
            color: futureColor,
            amount: Number(entry.amount)
          });
        }
      }

      rows.sort((a, b) => a.daysUntil - b.daysUntil);

      return { rows, events };
    }

    function renderTable(rows, tbodyId, emptyMessage) {
      const tbody = document.getElementById(tbodyId);
      if (!tbody) return;

      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5">${emptyMessage}</td></tr>`;
        return;
      }

      tbody.innerHTML = rows
        .map(
          (row) =>
            `<tr>
              <td>${row.name}</td>
              <td>${row.amount}</td>
              <td>${row.lastDate}</td>
              <td>${row.nextDate}</td>
              <td>${row.daysUntil}</td>
            </tr>`
        )
        .join("");
    }

    function getEventMonthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function getMonthLabel(date) {
      return date.toLocaleString("en-GB", { month: "long", year: "numeric" });
    }

    function parseIsoDate(value) {
      const [year, month, day] = String(value).split("-").map(Number);
      if (!Number.isFinite(year) || !Number.isFinite(month) || !Number.isFinite(day)) return null;
      return new Date(year, month - 1, day);
    }

    function sumUniqueEventsForMonth(events, monthKey) {
      const seen = new Set();
      let total = 0;

      for (const event of events) {
        const eventDate = parseIsoDate(event.start);
        if (!eventDate) continue;
        if (getEventMonthKey(eventDate) !== monthKey) continue;

        // Avoid double counting duplicate generated events with same date+title+amount.
        const dedupeKey = `${event.start}|${event.title}|${Number(event.amount).toFixed(2)}`;
        if (seen.has(dedupeKey)) continue;
        seen.add(dedupeKey);

        total += Number(event.amount) || 0;
      }

      return total;
    }

    function renderMonthlySummaryTable(monthDate, moneyInEvents, moneyOutEvents) {
      const tbody = document.getElementById("monthlySummaryBody");
      if (!tbody) return;

      const monthKey = getEventMonthKey(monthDate);
      const moneyInTotal = sumUniqueEventsForMonth(moneyInEvents, monthKey);
      const moneyOutTotal = sumUniqueEventsForMonth(moneyOutEvents, monthKey);
      const netTotal = moneyInTotal - moneyOutTotal;
      const totalClass = netTotal > 0 ? "total-positive" : (netTotal < 0 ? "total-negative" : "total-neutral");

      tbody.innerHTML = `<tr>
        <td>${currencySymbol}${moneyInTotal.toFixed(2)}</td>
        <td>${currencySymbol}${moneyOutTotal.toFixed(2)}</td>
        <td class="${totalClass}">${currencySymbol}${netTotal.toFixed(2)}</td>
        <td>${getMonthLabel(monthDate)}</td>
      </tr>`;
    }

    function renderCalendar(events, onMonthChange) {
      const calendarEl = document.getElementById("moneyCalendar");
      if (!calendarEl || typeof FullCalendar === "undefined") return;

      if (window.moneyCalendarInstance) {
        window.moneyCalendarInstance.destroy();
      }

      window.moneyCalendarInstance = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        height: "auto",
        firstDay: 1,
        events,
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: ""
        },
        datesSet(info) {
          if (typeof onMonthChange === "function") {
            onMonthChange(info.view.currentStart);
          }
        }
      });
      window.moneyCalendarInstance.render();
    }

    function renderApp() {
      const moneyInData = buildEntriesData(money_in, {
        futureColor: "#198754",
        pastColor: "#6c757d"
      });
      const moneyOutData = buildEntriesData(money_out, {
        futureColor: "#dc3545",
        pastColor: "#6c757d"
      });

      renderTable(moneyInData.rows, "moneyInBody", "No valid money in entries found.");
      renderTable(moneyOutData.rows, "moneyOutBody", "No valid bill entries found.");
      renderCalendar([...moneyInData.events, ...moneyOutData.events], (monthDate) => {
        renderMonthlySummaryTable(monthDate, moneyInData.events, moneyOutData.events);
      });
    }

    window.addEventListener("DOMContentLoaded", renderApp);
  </script>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 1.4rem;
      text-align: center;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 760px;
    }
    #moneyCalendar {
      width: 100%;
      max-width: 760px;
    }
    th, td {
      border: 1px solid #999;
      padding: 8px 10px;
      text-align: left;
    }
    th {
      background: rgba(127, 127, 127, 0.15);
    }
    .total-positive {
      color: #198754;
      font-weight: 700;
    }
    .total-negative {
      color: #dc3545;
      font-weight: 700;
    }
    .total-neutral {
      color: inherit;
      font-weight: 700;
    }
    /* Keep FullCalendar month title truly centered */
    .fc .fc-header-toolbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
    }
    .fc .fc-toolbar-chunk:nth-child(1) {
      justify-self: start;
    }
    .fc .fc-toolbar-chunk:nth-child(2) {
      justify-self: center;
    }
    .fc .fc-toolbar-chunk:nth-child(3) {
      justify-self: end;
    }
    .fc .fc-toolbar-title {
      margin: 0;
      text-align: center;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <h1>Pay Tracker</h1>
  <h2>Money In</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Amount</th>
        <th>Last Money In Date</th>
        <th>Next Money In Date</th>
        <th>Days Until</th>
      </tr>
    </thead>
    <tbody id="moneyInBody"></tbody>
  </table>
  <h2>Money Out</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Amount</th>
        <th>Last Bill Date</th>
        <th>Next Bill Date</th>
        <th>Days Until</th>
      </tr>
    </thead>
    <tbody id="moneyOutBody"></tbody>
  </table>
  <h2>Monthly Totals</h2>
  <table>
    <thead>
      <tr>
        <th>Money In</th>
        <th>Money out</th>
        <th>Total</th>
        <th>Month</th>
      </tr>
    </thead>
    <tbody id="monthlySummaryBody"></tbody>
  </table>
  <div id="moneyCalendar" aria-label="Money calendar"></div>
</body>
</html>
